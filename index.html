<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>분야별 통합 교집합 분석기</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #0a0a0a; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            padding: 20px; 
            max-width: 800px; 
            margin: 0 auto; 
        }
        h1 { 
            color: #ffd700; 
            text-align: center; 
            margin-bottom: 20px; 
            font-size: 24px; 
            border-bottom: 2px solid #ffd700; 
            padding-bottom: 10px; 
        }
        h2 { 
            color: #ffd700; 
            font-size: 18px; 
            margin: 20px 0 10px; 
            border-left: 5px solid #ffd700; 
            padding-left: 10px; 
        }
        h3 { 
            color: #00e6b8; 
            font-size: 16px; 
            margin: 15px 0 5px; 
        }
        .input-section {
            background: #1a1a1a;
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 200px;
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #ffd700;
            border-radius: 10px;
            padding: 10px;
            font-size: 12px;
            font-family: monospace;
            margin-bottom: 10px;
        }
        button {
            background: #ffd700;
            color: #000;
            border: none;
            border-radius: 30px;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            margin-right: 5px;
        }
        button:hover {
            background: #00e6b8;
        }
        .result-section {
            background: #1a1a1a;
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 15px;
            min-height: 300px;
        }
        .group-box {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            border-left: 5px solid #ffd700;
        }
        .group-title {
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .numbers {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .number-ball {
            display: inline-flex;
            width: 30px;
            height: 30px;
            background: #333;
            border: 1px solid #ffd700;
            border-radius: 50%;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
        }
        .gold-badge {
            background: #ffd700;
            color: #000;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 20px;
            display: inline-block;
            margin-left: 5px;
            font-size: 11px;
        }
        .green-badge {
            background: #2ecc71;
            color: #000;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 20px;
            display: inline-block;
            margin-left: 5px;
            font-size: 11px;
        }
        .blue-badge {
            background: #3498db;
            color: #fff;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 20px;
            display: inline-block;
            margin-left: 5px;
            font-size: 11px;
        }
        .rank-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        .rank-table th {
            background: #ffd700;
            color: #000;
            padding: 8px;
            font-size: 12px;
        }
        .rank-table td {
            padding: 8px;
            border-bottom: 1px solid #444;
            font-size: 12px;
        }
        .rank-1 { background: #ffd70033; }
        .rank-2 { background: #2ecc7133; }
        .rank-3 { background: #3498db33; }
        .final-recommend {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border: 3px solid #ffd700;
            border-radius: 20px;
            padding: 15px;
            margin-top: 20px;
        }
        .final-number {
            display: inline-flex;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            margin: 3px;
            border: 2px solid white;
        }
        .level-3 { background: #ffd700; color: #000; }
        .level-2 { background: #2ecc71; color: #000; }
        .level-1 { background: #3498db; color: #fff; }
    </style>
</head>
<body>
    <h1>📊 분야별 통합 교집합 분석기</h1>
    
    <div class="input-section">
        <h3>📋 데이터 붙여넣기</h3>
        <textarea id="dataInput" placeholder="여기에 상태창 데이터를 붙여넣으세요...

예시:
🤖AI
3 7 12 18 21 25 30 35 40 (1)
🤝교집합 (0)
합집합
2 3 5 7 8 11 12 15 18 19 21 22 25 27 30 31 35 36 40 (4)
⬆️AI→특수
5 8 11
⬇️특수→AI
18 21 25
❌유실
1 4 6 9 13 17
🔷추천
3 7 12 15 18 19 21 22 25 27 30 31 35 40 (4)"></textarea>
        <button onclick="analyzeData()">🔍 분석하기</button>
        <button onclick="clearData()">🗑️ 지우기</button>
        <button onclick="copyResult()">📋 결과 복사</button>
    </div>

    <div class="result-section" id="resultArea">
        <h3 style="color:#ffd700; text-align:center;">👉 데이터를 붙여넣고 분석하기를 눌러주세요</h3>
    </div>

    <script>
        function parseNumbers(text) {
            if (!text) return [];
            
            // 괄호 안의 당첨개수 제거
            text = text.replace(/\(\d+\)/g, '');
            
            // 숫자만 추출 (공백, 쉼표 모두 처리)
            let numbers = [];
            let matches = text.match(/\d+/g);
            if (matches) {
                numbers = matches.map(Number);
            }
            return numbers;
        }

        function extractGroups(inputText) {
            let lines = inputText.split('\n');
            let groups = {};
            let currentGroup = null;
            let currentText = '';
            
            for (let line of lines) {
                line = line.trim();
                if (!line) continue;
                
                // 그룹 헤더 감지
                if (line.match(/^🤖AI|^🤝교집합|^합집합|^⬆️AI→특수|^⬇️특수→AI|^❌유실|^🔷추천/)) {
                    // 이전 그룹 저장
                    if (currentGroup && currentText) {
                        groups[currentGroup] = {
                            raw: currentGroup,
                            numbers: parseNumbers(currentText)
                        };
                    }
                    
                    // 새 그룹 시작
                    let headerMatch = line.match(/^([^0-9(]+)/);
                    if (headerMatch) {
                        currentGroup = headerMatch[1].trim();
                        currentText = line;
                    }
                } else if (currentGroup) {
                    currentText += ' ' + line;
                }
            }
            
            // 마지막 그룹 저장
            if (currentGroup && currentText) {
                groups[currentGroup] = {
                    raw: currentGroup,
                    numbers: parseNumbers(currentText)
                };
            }
            
            return groups;
        }

        function findIntersections(groups) {
            let allNumbers = new Set();
            let groupMap = {};
            
            // 모든 숫자 수집
            for (let [groupName, data] of Object.entries(groups)) {
                groupMap[groupName] = data.numbers;
                data.numbers.forEach(n => allNumbers.add(n));
            }
            
            // 각 숫자가 속한 그룹 찾기
            let intersections = [];
            let groupNames = Object.keys(groups);
            
            for (let num of Array.from(allNumbers).sort((a,b) => a-b)) {
                let belongsTo = [];
                for (let group of groupNames) {
                    if (groupMap[group].includes(num)) {
                        belongsTo.push(group);
                    }
                }
                if (belongsTo.length >= 2) { // 2개 이상 그룹에 속한 숫자만
                    intersections.push({
                        number: num,
                        groups: belongsTo,
                        count: belongsTo.length
                    });
                }
            }
            
            // 그룹 수 기준 내림차순 정렬
            intersections.sort((a,b) => b.count - a.count);
            
            return intersections;
        }

        function analyzeData() {
            let input = document.getElementById('dataInput').value;
            if (!input.trim()) {
                alert('데이터를 붙여넣어주세요!');
                return;
            }
            
            let groups = extractGroups(input);
            let intersections = findIntersections(groups);
            
            // 결과 HTML 생성
            let html = '';
            
            // 1. 입력된 그룹 표시
            html += '<h2>📦 입력된 그룹</h2>';
            for (let [name, data] of Object.entries(groups)) {
                html += `<div class="group-box">`;
                html += `<div class="group-title">${name} <span class="gold-badge">${data.numbers.length}개</span></div>`;
                html += `<div class="numbers">`;
                data.numbers.forEach(n => {
                    html += `<span class="number-ball">${n}</span>`;
                });
                html += `</div></div>`;
            }
            
            // 2. 분야별 교집합 분석
            html += '<h2>🔍 분야별 통합 교집합</h2>';
            
            // 3개 이상 그룹 교집합
            let tripleIntersection = intersections.filter(x => x.count >= 3);
            if (tripleIntersection.length > 0) {
                html += '<h3>🥇 3개 이상 그룹 교집합 (최상위) <span class="green-badge">⭐ 핵심</span></h3>';
                html += '<table class="rank-table">';
                html += '<tr><th>숫자</th><th>포함된 그룹</th><th>그룹 수</th></tr>';
                tripleIntersection.forEach(item => {
                    html += `<tr class="rank-1">`;
                    html += `<td><strong style="font-size:16px;">${item.number}</strong></td>`;
                    html += `<td>${item.groups.join(' + ')}</td>`;
                    html += `<td>${item.count}</td>`;
                    html += `</tr>`;
                });
                html += '</table>';
            }
            
            // 2개 그룹 교집합
            let doubleIntersection = intersections.filter(x => x.count === 2);
            if (doubleIntersection.length > 0) {
                html += '<h3>🥈 2개 그룹 교집합</h3>';
                html += '<table class="rank-table">';
                html += '<tr><th>숫자</th><th>포함된 그룹</th></tr>';
                doubleIntersection.forEach(item => {
                    html += `<tr class="rank-2">`;
                    html += `<td><strong>${item.number}</strong></td>`;
                    html += `<td>${item.groups.join(' + ')}</td>`;
                    html += `</tr>`;
                });
                html += '</table>';
            }
            
            // 3. 숫자별 그룹 포함 관계
            html += '<h2>📊 숫자별 그룹 포함 관계</h2>';
            
            let allNumbers = [];
            for (let [name, data] of Object.entries(groups)) {
                data.numbers.forEach(n => {
                    let existing = allNumbers.find(x => x.num === n);
                    if (existing) {
                        existing.groups.push(name);
                    } else {
                        allNumbers.push({num: n, groups: [name]});
                    }
                });
            }
            
            allNumbers.sort((a,b) => a.num - b.num);
            
            html += '<div style="max-height:300px; overflow-y:auto;">';
            html += '<table class="rank-table">';
            html += '<tr><th>숫자</th><th>포함된 그룹</th><th>개수</th></tr>';
            allNumbers.forEach(item => {
                let rowClass = '';
                if (item.groups.length >= 3) rowClass = 'rank-1';
                else if (item.groups.length === 2) rowClass = 'rank-2';
                else rowClass = 'rank-3';
                
                html += `<tr class="${rowClass}">`;
                html += `<td><strong>${item.num}</strong></td>`;
                html += `<td>${item.groups.join(', ')}</td>`;
                html += `<td>${item.groups.length}</td>`;
                html += `</tr>`;
            });
            html += '</table></div>';
            
            // 4. 🎯 최종 추천 숫자 (우선순위별)
            html += '<div class="final-recommend">';
            html += '<h2 style="margin-top:0; color:#ffd700; text-align:center;">🎯 최종 추천 숫자 (우선순위)</h2>';
            
            if (intersections.length > 0) {
                // 레벨별로 분류
                let level3 = intersections.filter(x => x.count >= 3).map(x => x.number);
                let level2 = intersections.filter(x => x.count === 2).map(x => x.number);
                let level1 = intersections.filter(x => x.count === 1).map(x => x.number);
                
                // 3개 이상 그룹 (최우선)
                if (level3.length > 0) {
                    html += '<div style="margin: 15px 0;">';
                    html += '<span class="gold-badge" style="font-size:14px;">⭐ 3개 이상 그룹 (최우선)</span>';
                    html += '<div style="margin-top:10px;">';
                    level3.forEach(n => {
                        html += `<span class="final-number level-3">${n}</span>`;
                    });
                    html += '</div></div>';
                }
                
                // 2개 그룹 (차순위)
                if (level2.length > 0) {
                    html += '<div style="margin: 15px 0;">';
                    html += '<span class="green-badge" style="font-size:14px;">🔸 2개 그룹 (차순위)</span>';
                    html += '<div style="margin-top:10px;">';
                    level2.forEach(n => {
                        html += `<span class="final-number level-2">${n}</span>`;
                    });
                    html += '</div></div>';
                }
                
                // 1개 그룹 (참고용)
                if (level1.length > 0) {
                    html += '<div style="margin: 15px 0;">';
                    html += '<span class="blue-badge" style="font-size:14px;">🔹 1개 그룹 (참고)</span>';
                    html += '<div style="margin-top:10px;">';
                    level1.forEach(n => {
                        html += `<span class="final-number level-1">${n}</span>`;
                    });
                    html += '</div></div>';
                }
                
                // 전체 추천 숫자 한눈에 보기
                html += '<div style="margin-top:20px; padding-top:10px; border-top:1px solid #444;">';
                html += '<span style="color:#ffd700;">📌 추천 우선순위: </span>';
                html += '<span class="level-3" style="width:20px; height:20px; font-size:12px; display:inline-block;">⭐</span> 최우선 ';
                html += '<span class="level-2" style="width:20px; height:20px; font-size:12px; display:inline-block;">🔸</span> 차순위 ';
                html += '<span class="level-1" style="width:20px; height:20px; font-size:12px; display:inline-block;">🔹</span> 참고';
                html += '</div>';
                
            } else {
                html += '<p style="text-align:center;">교집합 숫자가 없습니다.</p>';
            }
            
            html += '</div>';
            
            document.getElementById('resultArea').innerHTML = html;
        }
        
        function clearData() {
            document.getElementById('dataInput').value = '';
            document.getElementById('resultArea').innerHTML = '<h3 style="color:#ffd700; text-align:center;">👉 데이터를 붙여넣고 분석하기를 눌러주세요</h3>';
        }
        
        function copyResult() {
            let result = document.getElementById('resultArea').innerText;
            navigator.clipboard.writeText(result).then(() => {
                alert('📋 결과가 복사되었습니다!');
            });
        }
    </script>
</body>
</html>
